version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: office_arena_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: office_arena
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: office_arena_redis
    ports:
      - "6379:6379"
volumes:
  pgdata: